<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape, orientation=portrait">
    <title>StiRobot - Contrôleur</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body class="controller-page">
    
    <!-- Écran de Démarrage (Animation) -->
    <div id="splash-screen" class="splash-screen">
        <div class="logo-anim">
            <img src="assets/images/logo.png" alt="Logo">
            <div class="glow-ring"></div>
        </div>
        <p class="loading-text">INITIALISATION DES SYSTÈMES...</p>
    </div>

    <!-- Alerte Portrait (Pour forcer le Paysage sur le contrôleur) -->
    <div class="portrait-warning">
        <div class="icon">🔄</div>
        <p>VEUILLEZ TOURNER VOTRE TÉLÉPHONE</p>
        <span>Le pilotage nécessite le mode paysage</span>
    </div>

    <!-- Layout Paysage -->
    <div class="landscape-container">
        
        <!-- Zone Gauche : Moteurs -->
        <aside class="control-side left-side">
            <div class="d-pad">
                <div></div>
                <button class="glass dir-btn" id="btn-z" data-key="z">▲</button>
                <div></div>
                <button class="glass dir-btn" id="btn-q" data-key="q">◀</button>
                <button class="glass dir-btn" id="btn-s" data-key="s">▼</button>
                <button class="glass dir-btn" id="btn-d" data-key="d">▶</button>
            </div>
            <div class="side-actions">
                <button class="glass btn-secondary" id="btn-demarrage">🔌 DÉMARRAGE</button>
            </div>
        </aside>

        <!-- Zone Centrale : Vidéo + Télémétrie -->
        <main class="video-center">
            <div class="video-wrapper">
                <iframe src="https://vdo.ninja/?view=StirobotCam&autoplay=1&buffer=0" allow="autoplay; camera; microphone; fullscreen"></iframe>
                <div class="telemetry-overlay">
                    <div class="glass stat-chip">⚡ <span id="vitesse">0 km/h</span></div>
                    <div class="glass stat-chip">🌡️ <span id="temp">--</span>°C</div>
                    <div class="glass stat-chip">🛰️ <span id="sats">0</span></div>
                </div>
            </div>
            <footer class="bottom-bar">
                <div id="conn-status" class="glass status-indicator">
                    <span class="status-dot"></span>
                    <span id="status-text">CONNECTÉ</span>
                </div>
            </footer>
        </main>

        <!-- Zone Droite : Caméra (Servos) -->
        <aside class="control-side right-side">
            <div class="d-pad">
                <div></div>
                <button class="glass dir-btn" data-key="ArrowUp">▲</button>
                <div></div>
                <button class="glass dir-btn" data-key="ArrowLeft">◀</button>
                <button class="glass dir-btn" data-key="ArrowDown">▼</button>
                <button class="glass dir-btn" data-key="ArrowRight">▶</button>
            </div>
            <div class="side-actions">
                <button class="glass btn-secondary" id="btn-lumiere">💡 LUMIÈRE</button>
                <button class="glass btn-secondary" onclick="window.location.href='index.html'">🏡 RETOUR</button>
            </div>
        </aside>

    </div>

    <script src="assets/js/controller.js"></script>
</body>
</html>
