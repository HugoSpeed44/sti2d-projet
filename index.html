<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StiRobot Mobile</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0ea5e9">
</head>
<body>
    <!-- Écran de Démarrage (Animation) -->
    <div id="splash-screen" class="splash-screen">
        <div class="logo-anim">
            <img src="assets/images/logo.png" alt="Logo">
            <div class="glow-ring"></div>
        </div>
        <p class="loading-text">INITIALISATION DES SYSTÈMES...</p>
    </div>

    <div class="bg-glow"></div>
    
    <main class="landing-container">
        <header class="logo-container">
            <h1>StiRobot</h1>
            <p>MOBILE CONTROL UNIT</p>
        </header>

        <section class="button-grid">
            <button class="btn-primary" onclick="window.location.href='controller.html'">
                <span>🎮</span>
                <span>Contrôleur Robot</span>
            </button>
            <button class="btn-secondary" disabled>
                <span>➕</span>
                <span>Prochainement...</span>
            </button>
        </section>

        <footer style="margin-top: auto; padding-bottom: 2rem;">
            <div id="status-box" class="glass status-indicator">
                <span class="status-dot"></span>
                <span id="status-text">DISCONNECTÉ</span>
            </div>
        </footer>
    </main>

    <script src="assets/js/app.js"></script>
</body>
</html>
