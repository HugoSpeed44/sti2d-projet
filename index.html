<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StiRobot Mobile</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0ea5e9">
</head>

<body>
    <!-- Écran de Démarrage (Animation) -->
    <div id="splash-screen" class="splash-screen">
        <div class="logo-anim">
            <img src="assets/images/logo.png" alt="Logo">
            <div class="glow-ring"></div>
        </div>
        <p class="loading-text">INITIALISATION DES SYSTÈMES...</p>
    </div>

    <div class="bg-glow"></div>

    <main class="landing-container">
        <!-- Top Bar Dashboard -->
        <div class="top-bar">
            <div class="system-status">
                <div class="pulse-dot"></div>
                <span>SYSTEM: NOMINAL</span>
            </div>
            <div class="system-status">
                <span id="clock-display">22:05:12</span>
            </div>
        </div>

        <!-- Central Robot Unit -->
        <section class="unit-card">
            <div class="robot-preview">
                <div class="icon">🤖</div>
            </div>
            <h1>StiRobot</h1>
            <div class="model-id">TERRA-EXPLORER // V4.0</div>
        </section>

        <!-- Action Grid -->
        <section class="button-grid">
            <button class="btn-primary" onclick="window.location.href='controller.html'">
                <span>🎮</span>
                <span>Lancer Mission</span>
            </button>
            <button class="btn-secondary" onclick="window.location.href='./presentation/index.html'">
                <span>📂</span>
                <span>Dossier Technique</span>
            </button>
        </section>

        <!-- Footer -->
        <footer style="margin-top: auto;">
            <div id="status-box" class="glass status-indicator" style="justify-content: center; border: 1px solid rgba(255,255,255,0.05);">
                <span class="status-dot"></span>
                <span id="status-text" style="font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 2px;">CHECKING LINKS...</span>
            </div>
        </footer>
    </main>

    <script src="assets/js/app.js"></script>
</body>

</html>
