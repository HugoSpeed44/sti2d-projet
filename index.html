<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StiRobot Mobile</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0ea5e9">
</head>

<body class="menu-page">
    <div class="bg-glow"></div>

    <main class="landing-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 2rem; height: 100vh; width: 100vw; overflow: hidden;">
        
        <section class="unit-card">
            <h1 style="font-size: 3.5rem; margin-bottom: 0;">StiRobot</h1>
            <p style="color: var(--text-dim); font-family: monospace; letter-spacing: 3px; font-size: 0.8rem;">TERRA-EXPLORER V4</p>
        </section>

        <section class="button-grid" style="width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 1.5rem;">
            <button class="btn-primary" onclick="location.href='controller.html'" style="width: 100%;">
                <span>🎮</span> LANCER MISSION
            </button>
            
            <button class="btn-secondary" onclick="location.href='./presentation/index.html'" style="width: 100%;">
                <span>📂</span> DOSSIER TECHNIQUE
            </button>
        </section>

        <div id="status-box" class="glass" style="padding: 0.8rem 1.5rem; border-radius: 50px; pointer-events: none;">
            <span id="status-text" style="font-family: monospace; font-size: 0.6rem; color: var(--primary); letter-spacing: 2px;">SYSTÈME PRÊT</span>
        </div>
    </main>

    <script src="assets/js/app.js"></script>
</body>

</html>
